            var ts = (h<10?'0':'')+h+':'+(m<10?'0':'')+m;

            var replies = [

            ];
            var self = this;
            setTimeout(function() {
                var now2 = new Date();
                var h2 = now2.getHours(); var m2 = now2.getMinutes();
                var ts2 = (h2<10?'0':'')+h2+':'+(m2<10?'0':'')+m2;
                var bots = ['xX_DarkAngel_Xx','h4ck3rm4n','~CoolDude~','n00bmaster'];

}

.w98-win { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 520px; background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; box-shadow: 1px 1px 0 0 #000; display: flex; flex-direction: column; }
.w98-titlebar { background: linear-gradient(90deg,#000080,#1084d0); color: #fff; font-weight: bold; font-size: 11px; padding: 3px 4px; display: flex; align-items: center; justify-content: space-between; }
.w98-titlebar-btns { display: flex; gap: 2px; }
.w98-titlebar-btns button { width: 16px; height: 14px; background: #c0c0c0; border: 1px solid; border-color: #fff #808080 #808080 #fff; font-size: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; }
.w98-menu { background: #c0c0c0; padding: 2px 0; border-bottom: 1px solid #808080; display: flex; }
.w98-menu span { padding: 2px 8px; cursor: pointer; }
.w98-menu span:hover { background: #000080; color: #fff; }
.w98-notepad { background: #fff; color: #000; font-family: 'Lucida Console','Courier New', monospace; font-size: 13px; padding: 6px; margin: 3px; border: 1px solid; border-color: #808080 #fff #fff #808080; min-height: 220px; line-height: 1.6; white-space: pre-wrap; }
.w98-notepad a { color: #00f; }
.w98-statusbar { background: #c0c0c0; border-top: 1px solid #808080; padding: 2px 6px; font-size: 10px; color: #444; display: flex; justify-content: space-between; }
.w98-statusbar div { border: 1px solid; border-color: #808080 #fff #fff #808080; padding: 1px 6px; }
.w98-taskbar { position: fixed; bottom: 0; left: 0; width: 100%; height: 32px; background: #c0c0c0; border-top: 2px solid #fff; display: flex; align-items: center; padding: 2px 4px; gap: 4px; z-index: 1000; }
.w98-start { height: 24px; background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; padding: 0 8px; font-weight: bold; font-size: 11px; font-family: Tahoma; cursor: pointer; display: flex; align-items: center; gap: 4px; }
.w98-taskdiv { width: 2px; height: 22px; border-left: 1px solid #808080; border-right: 1px solid #fff; margin: 0 2px; }
.w98-taskbtn { height: 24px; background: #c0c0c0; border: 2px solid; border-color: #808080 #fff #fff #808080; padding: 0 10px; font-size: 11px; font-family: Tahoma; cursor: pointer; display: flex; align-items: center; gap: 4px; }
.w98-clock { margin-left: auto; border: 1px solid; border-color: #808080 #fff #fff #808080; padding: 2px 10px; font-size: 11px; }
.w98-startmenu { display: none; position: fixed; bottom: 32px; left: 0; width: 200px; background: #c0c0c0; border: 2px solid; border-color: #fff #808080 #808080 #fff; box-shadow: 2px -2px 4px rgba(0,0,0,0.2); z-index: 1001; }
.w98-startmenu.open { display: block; }
.w98-sm-sidebar { position: absolute; left: 0; top: 0; bottom: 0; width: 22px; background: linear-gradient(0deg, #000080, #1084d0); }
.w98-sm-sidebar span { color: #fff; font-weight: bold; font-size: 14px; writing-mode: vertical-rl; transform: rotate(180deg); position: absolute; bottom: 6px; left: 3px; letter-spacing: 1px; }
.w98-sm-items { margin-left: 22px; padding: 2px 0; }
.w98-sm-item { padding: 6px 10px; cursor: pointer; font-size: 11px; display: flex; align-items: center; gap: 8px; text-decoration: none; color: #000; }
.w98-sm-item:hover { background: #000080; color: #fff; }
.w98-sm-sep { border-top: 1px solid #808080; border-bottom: 1px solid #fff; margin: 2px 24px 2px 24px; }
.w98-cursor { display: inline-block; width: 1px; height: 13px; background: #000; animation: w98blink 1s step-end infinite; vertical-align: text-bottom; }
@keyframes w98blink { 50%{opacity:0} }
.w98-bsod { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0000aa; color: #fff; font-family: 'Lucida Console','Courier New',monospace; font-size: 14px; padding: 60px 80px; z-index: 2000; line-height: 1.6; white-space: pre-wrap; }
#shuffle-btn { background: #c0c0c0; color: #808080; border: 1px solid #808080; bottom: 40px; }

init: function() {
    var el = document.getElementById('w98clock');
    if (!el) return;
    function tick() {
        var d = new Date(), h = d.getHours(), m = d.getMinutes(), ap = h>=12?'PM':'AM';
        h = h%12||12; el.textContent = h+':'+(m<10?'0':'')+m+' '+ap;
    }
    tick(); setInterval(tick, 30000);
    var startBtn = document.getElementById('w98startbtn');
    var startMenu = document.getElementById('w98startmenu');
    if (startBtn && startMenu) {
        startBtn.addEventListener('click', function(e) { e.stopPropagation(); startMenu.classList.toggle('open'); });
        document.addEventListener('click', function() { startMenu.classList.remove('open'); });
        startMenu.addEventListener('click', function(e) { e.stopPropagation(); });
    }
    var shutdown = document.getElementById('w98shutdown');
    var bsod = document.getElementById('w98bsod');
    if (shutdown && bsod) {
        shutdown.addEventListener('click', function() {
            startMenu.classList.remove('open');
            bsod.style.display = 'block';
            document.addEventListener('keydown', function handler() {
                bsod.style.display = 'none';
                document.removeEventListener('keydown', handler);
            });
        });
    }
}
}

];

var currentIndex = 0;
var remaining = [];

function fillBag() {
    remaining = [];
    for (var i = 0; i < styles.length; i++) {
        if (i !== currentIndex) remaining.push(i);
    }
    for (var j = remaining.length - 1; j > 0; j--) {
        var k = Math.floor(Math.random() * (j + 1));
        var tmp = remaining[j]; remaining[j] = remaining[k]; remaining[k] = tmp;
    }
}

function applyStyle(index) {
    currentIndex = index;
    var s = styles[index];
    document.getElementById('page').innerHTML = s.html;
    document.getElementById('dynamic-css').textContent = s.css;
    if (s.init) s.init();
}

function shuffle() {
    if (remaining.length === 0) fillBag();
    applyStyle(remaining.pop());
}

var styleEl = document.createElement('style');
styleEl.id = 'dynamic-css';
document.head.appendChild(styleEl);

applyStyle(0);

document.getElementById('shuffle-btn').addEventListener('click', shuffle);
</script>
