    var icqAudio = new Audio(ASSETS ? ASSETS.sndIcq : '');
    function icqSound() { icqAudio.currentTime = 0; icqAudio.play().catch(function(){}); }
    function send() {
        if (!input.value.trim()) return;
        var now = new Date();
        var h = now.getHours(); var m = now.getMinutes();
        var ts = (h<10?'0':'')+h+':'+(m<10?'0':'')+m;

            var now = new Date();
            var h = now.getHours(); var m = now.getMinutes();
            var ts = (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
            var msg = this.value.replace(/</g,'&lt;').replace(/>/g,'&gt;');
            log.innerHTML += '<span class="time">['+ts+']</span> <span class="nick">&lt;visitor&gt;</span> '+msg+'<br>';
            this.value = '';
            t('irc-message-sent', {message: msg});
            var replies = [
                'lol',
                'nice',
                'cool story bro',
                'anyone else here?',
                'brb',
                'a/s/l?',
                'check out viktoresadze.com',
                '...',
                'sup',
                'rofl',
                'gtg',
                'kk',
                'o rly?',
                'ya rly',
                'same',
                'lmao'
            ];
            var self = this;
            setTimeout(function() {
                var now2 = new Date();
                var h2 = now2.getHours(); var m2 = now2.getMinutes();
                var ts2 = (h2<10?'0':'')+h2+':'+(m2<10?'0':'')+m2;
                var bots = ['xX_DarkAngel_Xx','h4ck3rm4n','~CoolDude~','n00bmaster'];
                var bot = bots[Math.floor(Math.random()*bots.length)];
                var reply = replies[Math.floor(Math.random()*replies.length)];
                log.innerHTML += '<span class="time">['+ts2+']</span> <span class="nick" style="color:#7e7;">&lt;'+bot+'&gt;</span> '+reply+'<br>';
            }, 800 + Math.random()*2000);
        }
    });
}

    }
    tick(); setInterval(tick, 30000);
    var startBtn = document.getElementById('w98startbtn');
    var startMenu = document.getElementById('w98startmenu');
    if (startBtn && startMenu) {
        startBtn.addEventListener('click', function(e) { e.stopPropagation(); startMenu.classList.toggle('open'); t('w98-start-menu'); });
        document.addEventListener('click', function() { startMenu.classList.remove('open'); });

    var bsod = document.getElementById('w98bsod');
    if (shutdown && bsod) {
        shutdown.addEventListener('click', function() {
            startMenu.classList.remove('open');
            bsod.style.display = 'block'; t('w98-bsod');
            document.addEventListener('keydown', function handler() {
                bsod.style.display = 'none'; t('w98-bsod-dismiss');
                document.removeEventListener('keydown', handler);
            });
        });
    }
}
},

// 12 — FO (inline)
{ fo: true }

];

var currentIndex = 0;
var remaining = [];

var isMobile = window.innerWidth <= 768;
function fillBag() {
    remaining = [];
    for (var i = 0; i < styles.length; i++) {
        if (i === currentIndex) continue;
        if (isMobile && (designNames[i] === 'win98' || designNames[i] === 'fo')) continue;
        remaining.push(i);
    }
    for (var j = remaining.length - 1; j > 0; j--) {
        var k = Math.floor(Math.random() * (j + 1));
        var tmp = remaining[j]; remaining[j] = remaining[k]; remaining[k] = tmp;
    }
}

var foWrap = document.getElementById('fo-wrap');
var foActive = false;
var foLoaded = false;

function showFo() {
    document.getElementById('page').style.display = 'none';
    foWrap.classList.add('active');
    foActive = true;
    document.body.classList.add('fo-mode');
    if (!foLoaded) {
        foLoaded = true;
        initFo();
    }
    foRescale();
}

function hideFo() {
    foWrap.classList.remove('active');
    document.getElementById('page').style.display = '';
    foActive = false;
    document.body.classList.remove('fo-mode');
}

var designNames = ['readme','google','icq','irc','tumblr','phpbb','yahoo','geocities','win98','fo'];
function applyStyle(index) {
    currentIndex = index;
    var s = styles[index];
    t('design-shown', {design: designNames[index] || 'unknown'});
    if (s.fo) {
        showFo();
        return;
    }
    if (foActive) hideFo();
    document.getElementById('page').innerHTML = s.html;
    document.getElementById('dynamic-css').textContent = s.css;
    if (s.init) s.init();
}

function shuffle() {
    if (remaining.length === 0) fillBag();
    applyStyle(remaining.pop());
}

var styleEl = document.createElement('style');
styleEl.id = 'dynamic-css';
document.head.appendChild(styleEl);

applyStyle(0);

document.getElementById('shuffle-btn').addEventListener('click', function(){ t('shuffle-click'); shuffle(); });

// Lazy-load assets.js
(function() {
    var s = document.createElement('script');
    s.src = 'assets.js';
    s.onload = function() {
        // Inject font
        var st = document.createElement('style');
        st.textContent = "@font-face { font-family: 'Fallout'; src: url('" + ASSETS.font + "') format('truetype'); }";
        document.head.appendChild(st);
        // Apply images
        document.querySelector('.fo-world').style.backgroundImage = "url('" + ASSETS.back + "')";
        document.getElementById('fo-face-img').src = ASSETS.face;
        document.getElementById('fo-bottom-img').src = ASSETS.bottom;
        document.getElementById('fo-side-left').src = ASSETS.bottomleftright;
        document.getElementById('fo-side-right').src = ASSETS.bottomleftright;
    };
    document.head.appendChild(s);
})();

// FO rescale
function foRescale() {
    var wrap = document.getElementById('fo-scale-wrap');
    var face = document.querySelector('.fo-face');
    if (!wrap || !face) return;
    var w = window.innerWidth;
    var fw = Math.max(w, 1200);
    if (fw < 1900) {
        face.style.transform = 'translate(-50%, -50%) scale(' + (0.8 * fw / 1900) + ')';
    } else {
        face.style.transform = 'translate(-50%, -50%) scale(0.8)';
    }
    var rw = Math.max(w, 1200);
    if (rw >= 1800) {
        wrap.style.transform = 'none';
        wrap.style.width = '100%';
        wrap.style.height = '100vh';
    } else {
        var s = rw / 1800;
        wrap.style.width = '1800px';
        wrap.style.transform = 'scale(' + s + ')';
        wrap.style.height = (window.innerHeight / s) + 'px';
    }
}
window.addEventListener('resize', function() { if (foActive) foRescale(); });

// FO dialog system
function initFo() {
    var foText = document.getElementById('fo-dialog-text');
    var foOpts = document.getElementById('fo-dialog-opts');
    var SND_CLICK = new Audio(ASSETS.sndClick);
    var SND_INT = new Audio(ASSETS.sndInt);
    var LINKEDIN = 'https://www.linkedin.com/in/viktoresadze';
    var EMAIL = 'viktoresadze@gmail.com';

    var tree = {
        root: {
            npc: "Enclave field office. Sergeant Harris, Communications. State your business. I don't have all day.",
            options: [
                { label: "1. I'm looking for someone. Viktor Esadze.", goto: 'service' },
                { label: '2. What is this place?', goto: 'place' },
                { label: '3. [Leave] Nothing. Bye.', goto: 'leave' }
            ]
        },
        service: {
            npc: 'Viktor Esadze? Hold on. Yeah, got something here. What do you need? You can also leave a transmission, he\'ll get it. Eventually.',
            options: [
                { label: '1. [Access network file]', link: LINKEDIN },
                { label: '2. [Send transmission \u2014 ' + EMAIL + ']', mailto: EMAIL },
                { label: '3. Anything classified?', goto: 'classified1' },
                { label: '4. [Back]', goto: 'root' }
            ]
        },
        classified1: {
            npc: "That's above your clearance.",
            options: [
                { label: '1. [Insist] Come on.', goto: 'classified2' },
                { label: '2. [Back]', goto: 'service' }
            ]
        },
        classified2: {
            npc: "Civilian, I said no. Don't make me throw you out of here.",
            options: [
                { label: "1. [Insist harder] Aren't you bored to the death here?", goto: 'classified3' },
                { label: '2. [Back]', goto: 'service' }
            ]
        },
        classified3: {
            npc: '<em>He sighs. Slides a memo across the desk.</em><br><span style="display:block;height:6px"></span>MEMO #4772: To whoever keeps leaving Nuka-Cola Quantum in the shared fridge \u2014 it is GLOWING through the door and keeping night shift awake. FINAL warning. \u2014 Facilities Mgmt.',
            options: [
                { label: "1. ...that's the classified file?", goto: 'thatsit' }
            ]
        },
        thatsit: {
            npc: "What did you expect? The whole operation runs on one HTML file and a prayer. Happy now?",
            options: [
                { label: "1. [Intelligence 8] You're breaking character.", goto: 'intcheck' },
                { label: '2. Noted.', goto: 'service' }
            ]
        },
        intcheck: {
            npc: "Keep your voice down. The last guy who noticed got 404'd. You understand? Just take the file and go.",
            options: [
                { label: '1. [Nod and walk away]', goto: 'service' }
            ]
        },
        place: {
            npc: "Field office. Communications division. We keep the lights on. Mostly.",
            options: [
                { label: "1. I'm looking for someone. Viktor Esadze.", goto: 'service' },
                { label: '2. [Leave]', goto: 'leave' }
            ]
        },
        leave: {
            npc: "Door's behind you, civilian.",
            options: [
                { label: '1. [Talk again]', goto: 'root' }
            ]
        }
    };

    var foStaticText = document.querySelector('.fo-static-text');
    var memoFound = false;

    function foRender(nodeId) {
        var node = tree[nodeId];
        foText.innerHTML = node.npc;
        t('fo-dialog', {node: nodeId});
        if (nodeId === 'classified3' && !memoFound) {
            memoFound = true;
            t('fo-classified-memo');
            foStaticText.innerHTML += '<br><span style="padding-left:4px;font-size:18px">\u25CF</span>For finding a classified memo, you earn 400 exp. points.';
        }
        foOpts.innerHTML = '';
        node.options.forEach(function(o) {
            var a = document.createElement('a');
            a.className = 'fo-dialog-opt';
            a.textContent = o.label;
            if (o.link) { a.href = o.link; a.target = '_blank'; }
            else if (o.mailto) { a.href = 'mailto:' + o.mailto; }
            else { a.setAttribute('data-goto', o.goto); }
            foOpts.appendChild(a);
        });
    }

    foOpts.addEventListener('click', function(e) {
        var opt = e.target.closest('.fo-dialog-opt');
        if (!opt) return;
        var gt = opt.getAttribute('data-goto');
        if (gt) {
            e.preventDefault();
            if (gt === 'intcheck') { SND_INT.currentTime=0; SND_INT.play().catch(function(){}); t('fo-int-check'); }
            else { SND_CLICK.currentTime=0; SND_CLICK.play().catch(function(){}); }
            foRender(gt);
        }
    });

    foRender('root');
}
