init: function() {
    var input = document.getElementById('icq-input');
    var btn = document.getElementById('icq-send');
    var chat = document.getElementById('icq-chat');
    if (!input || !btn || !chat) return;
    function send() {
        if (!input.value.trim()) return;
        var now = new Date();
        var h = now.getHours(); var m = now.getMinutes();
        var ts = (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
        var msg = input.value.replace(/</g,'&lt;').replace(/>/g,'&gt;');
        chat.innerHTML += '<div class="icq-msg"><span class="icq-from icq-from-me">You</span><span class="icq-time">'+ts+'</span><br>'+msg+'</div>';
        input.value = '';
        chat.scrollTop = chat.scrollHeight;
    }
    btn.addEventListener('click', send);
    input.addEventListener('keydown', function(e) { if (e.key==='Enter') send(); });
}
},

    input.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && this.value.trim()) {
            var log = document.getElementById('irc-log');

            var h = now.getHours(); var m = now.getMinutes();

            this.value = '';
        }
    });
}

init: function() {
    var el = document.getElementById('w98clock');
    if (!el) return;
    function tick() {
        var d = new Date(), h = d.getHours(), m = d.getMinutes(), ap = h>=12?'PM':'AM';
        h = h%12||12; el.textContent = h+':'+(m<10?'0':'')+m+' '+ap;
    }
    tick(); setInterval(tick, 30000);
    var startBtn = document.getElementById('w98startbtn');
    var startMenu = document.getElementById('w98startmenu');
    if (startBtn && startMenu) {
        startBtn.addEventListener('click', function(e) { e.stopPropagation(); startMenu.classList.toggle('open'); });
        document.addEventListener('click', function() { startMenu.classList.remove('open'); });
        startMenu.addEventListener('click', function(e) { e.stopPropagation(); });
    }
}
}

];

var currentIndex = 0;

function applyStyle(index) {
    currentIndex = index;
    var s = styles[index];
    document.getElementById('page').innerHTML = s.html;
    document.getElementById('dynamic-css').textContent = s.css;
    if (s.init) s.init();
}

function shuffle() {
    var next;
    do { next = Math.floor(Math.random() * styles.length); } while (next === currentIndex);
    applyStyle(next);
}

var styleEl = document.createElement('style');
styleEl.id = 'dynamic-css';
document.head.appendChild(styleEl);

applyStyle(0);

document.getElementById('shuffle-btn').addEventListener('click', shuffle);
</script>
